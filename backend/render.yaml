# Render deployment configuration
services:
  - type: web
    name: smart-agriculture-ai-backend
    env: python
    buildCommand: "pip install -r requirements.txt && cd ../model && python generate_data.py && python train.py"
    startCommand: "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
